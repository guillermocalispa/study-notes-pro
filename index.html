<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cornell Cloud V3 - Firebase</title>
<style>
/* === TU CSS ORIGINAL COMPLETO (SIN CAMBIOS) === */
:root {
--primary: #4a90e2;
--secondary: #95a5a6;
--bg: #f4f7f6;
--paper: #ffffff;
--text: #333;
--border: #ddd;
--accent: #e67e22;
--success: #27ae60;
--danger: #e74c3c;
--purple: #9b59b6;
}
* { box-sizing: border-box; }
body {
font-family: 'Segoe UI', sans-serif;
background-color: var(--bg);
margin: 0;
color: var(--text);
min-height: 100vh;
display: flex;
flex-direction: column;
}
nav {
background: white;
padding: 15px 30px;
display: flex;
justify-content: space-between;
align-items: center;
border-bottom: 1px solid var(--border);
box-shadow: 0 2px 5px rgba(0,0,0,0.05);
position: sticky;
top: 0;
z-index: 1000;
}
.nav-brand {
font-size: 1.5rem;
font-weight: bold;
color: var(--primary);
cursor: pointer;
display: flex;
align-items: center;
gap: 10px;
}
.nav-version {
font-size: 0.8rem;
background: var(--accent);
color: white;
padding: 2px 8px;
border-radius: 10px;
}
.nav-controls button {
background: var(--primary);
color: white;
border: none;
padding: 8px 15px;
border-radius: 4px;
cursor: pointer;
margin-left: 10px;
font-weight: 500;
transition: background 0.3s;
}
.nav-controls button:hover { opacity: 0.9; }
.nav-controls button.secondary { background: var(--secondary); }
.nav-controls button.accent { background: var(--accent); }
.nav-controls button.success { background: var(--success); }
.view {
display: none;
padding: 20px;
min-height: calc(100vh - 70px);
animation: fadeIn 0.3s;
}
.view.active { display: block; }
@keyframes fadeIn {
from { opacity: 0; transform: translateY(10px); }
to { opacity: 1; transform: translateY(0); }
}
#vista-temas { max-width: 1000px; margin: 0 auto; width: 100%; }
.temas-header {
display: flex;
justify-content: space-between;
align-items: center;
margin-bottom: 30px;
}
.grid-temas {
display: grid;
grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
gap: 20px;
}
.tema-card {
background: white;
border: 2px solid var(--border);
border-radius: 12px;
padding: 30px 20px;
cursor: pointer;
text-align: center;
transition: all 0.3s;
position: relative;
overflow: hidden;
}
.tema-card:hover {
border-color: var(--primary);
transform: translateY(-5px);
box-shadow: 0 10px 20px rgba(0,0,0,0.1);
}
.tema-card h2 { margin: 0; color: var(--primary); font-size: 1.4rem; }
.tema-card .count { display: block; margin-top: 10px; color: #999; font-size: 0.9rem; }
.btn-delete-tema {
position: absolute;
top: 5px;
right: 5px;
background: var(--danger);
color: white;
border: none;
width: 25px;
height: 25px;
border-radius: 50%;
cursor: pointer;
opacity: 0;
transition: opacity 0.2s;
}
.tema-card:hover .btn-delete-tema { opacity: 1; }
#vista-indice { max-width: 1200px; margin: 0 auto; width: 100%; }
.breadcrumb {
margin-bottom: 20px;
color: #666;
font-size: 1.1rem;
}
.breadcrumb span { color: var(--primary); font-weight: bold; cursor: pointer; }
.toolbar {
display: flex;
gap: 15px;
margin-bottom: 30px;
background: white;
padding: 15px;
border-radius: 8px;
box-shadow: 0 2px 5px rgba(0,0,0,0.05);
flex-wrap: wrap;
}
.search-box {
flex-grow: 1;
padding: 10px;
border: 1px solid var(--border);
border-radius: 4px;
font-size: 1rem;
min-width: 200px;
}
.grid-notas {
display: grid;
grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
gap: 20px;
}
.nota-card {
background: white;
border: 1px solid var(--border);
border-radius: 8px;
padding: 20px;
cursor: pointer;
transition: transform 0.2s, box-shadow 0.2s;
display: flex;
flex-direction: column;
height: 250px;
border-left: 5px solid var(--primary);
}
.nota-card:hover {
transform: translateY(-5px);
box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}
.nota-card h3 { margin-top: 0; color: #333; font-size: 1.2rem; }
.nota-card p { color: #666; font-size: 0.9rem; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; }
.nota-preview-media {
display: flex;
gap: 5px;
margin-top: 10px;
flex-wrap: wrap;
}
.media-icon {
font-size: 1.2rem;
background: #f0f0f0;
padding: 5px;
border-radius: 4px;
}
.nota-meta {
margin-top: auto;
padding-top: 10px;
font-size: 0.8rem;
color: #999;
display: flex;
justify-content: space-between;
border-top: 1px solid #eee;
}
#vista-editor { max-width: 1000px; margin: 0 auto; width: 100%; padding-bottom: 50px; }
.hoja-cornell {
background: white;
min-height: 800px;
box-shadow: 0 5px 15px rgba(0,0,0,0.1);
display: flex;
flex-direction: column;
border-radius: 4px;
overflow: hidden;
}
.editor-header {
padding: 20px;
border-bottom: 2px solid #333;
background: #f9f9f9;
display: flex;
gap: 10px;
align-items: center;
flex-wrap: wrap;
}
.editor-header input {
flex-grow: 1;
font-size: 1.5rem;
border: none;
background: transparent;
font-weight: bold;
outline: none;
min-width: 200px;
}
.editor-tools {
display: flex;
gap: 10px;
flex-wrap: wrap;
margin-bottom: 10px;
padding: 10px 20px;
background: #f5f5f5;
border-bottom: 1px solid var(--border);
}
.tool-btn {
padding: 8px 12px;
border: 1px solid var(--border);
background: white;
border-radius: 4px;
cursor: pointer;
font-size: 0.9rem;
display: flex;
align-items: center;
gap: 5px;
transition: all 0.2s;
}
.tool-btn:hover { background: #f0f0f0; }
.tool-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
.tool-btn.danger { color: var(--danger); border-color: var(--danger); }
.tool-btn.danger:hover { background: var(--danger); color: white; }
.tool-separator {
width: 1px;
background: var(--border);
margin: 0 5px;
}
.color-picker {
width: 30px;
height: 30px;
border: none;
cursor: pointer;
border-radius: 4px;
}
.brush-size {
width: 80px;
padding: 5px;
}
.cuerpo-cornell {
display: flex;
flex: 1;
min-height: 500px;
position: relative;
}
.col-izq {
width: 30%;
border-right: 2px solid #333;
padding: 15px;
background: #fcfcfc;
display: flex;
flex-direction: column;
}
.col-der {
width: 70%;
padding: 15px;
display: flex;
flex-direction: column;
}
.resumen-cornell {
min-height: 120px;
border-top: 2px solid #333;
background: #f0f4f8;
padding: 15px;
}
textarea {
width: 100%;
height: 100%;
min-height: 200px;
border: none;
resize: vertical;
outline: none;
font-family: inherit;
font-size: 1rem;
line-height: 1.5;
background: transparent;
}
.canvas-container {
position: relative;
border: 1px dashed var(--border);
border-radius: 4px;
margin: 10px 0;
background: white;
overflow: hidden;
}
.canvas-container canvas {
display: block;
cursor: crosshair;
touch-action: none;
}
.canvas-toolbar {
position: absolute;
top: 5px;
right: 5px;
display: flex;
gap: 5px;
background: rgba(255,255,255,0.9);
padding: 5px;
border-radius: 4px;
}
.canvas-toolbar button {
padding: 3px 8px;
font-size: 0.8rem;
border: 1px solid var(--border);
background: white;
cursor: pointer;
border-radius: 3px;
}
.media-item {
border: 1px solid var(--border);
border-radius: 8px;
padding: 10px;
margin: 10px 0;
background: #fafafa;
position: relative;
}
.media-item img {
max-width: 100%;
max-height: 300px;
border-radius: 4px;
display: block;
margin: 0 auto;
}
.media-item .media-link {
display: block;
padding: 10px;
background: #e3f2fd;
color: #1565c0;
text-decoration: none;
border-radius: 4px;
word-break: break-all;
}
.media-item .media-link:hover {
background: #bbdefb;
}
.media-delete {
position: absolute;
top: 5px;
right: 5px;
background: var(--danger);
color: white;
border: none;
width: 25px;
height: 25px;
border-radius: 50%;
cursor: pointer;
font-size: 1rem;
}
.media-caption {
text-align: center;
color: #666;
font-size: 0.9rem;
margin-top: 5px;
font-style: italic;
}
.hyperlink-tag {
background-color: #e3f2fd;
color: #1565c0;
padding: 2px 6px;
border-radius: 4px;
cursor: pointer;
text-decoration: underline;
font-weight: bold;
display: inline-block;
margin: 2px;
}
.hyperlink-tag:hover { background-color: #bbdefb; }
.external-link-tag {
background-color: #e8f5e9;
color: #2e7d32;
padding: 2px 6px;
border-radius: 4px;
cursor: pointer;
text-decoration: underline;
font-weight: bold;
display: inline-block;
margin: 2px;
}
.external-link-tag:hover { background-color: #c8e6c9; }
.modal {
position: fixed;
top: 50%;
left: 50%;
transform: translate(-50%, -50%);
background: white;
padding: 25px;
border-radius: 8px;
box-shadow: 0 0 20px rgba(0,0,0,0.3);
z-index: 1000;
display: none;
min-width: 350px;
max-width: 90%;
}
.modal h3 { margin-top: 0; color: var(--primary); }
.modal input, .modal select, .modal textarea {
width: 100%;
padding: 10px;
margin: 10px 0;
border: 1px solid var(--border);
border-radius: 4px;
font-size: 1rem;
}
.modal-actions {
display: flex;
gap: 10px;
margin-top: 15px;
}
.modal-actions button {
flex: 1;
padding: 10px;
border: none;
border-radius: 4px;
cursor: pointer;
color: white;
font-weight: 500;
}
.btn-confirm { background: var(--primary); }
.btn-cancel { background: var(--secondary); }
.btn-success { background: var(--success); }
.btn-danger { background: var(--danger); }
.overlay {
position: fixed;
top: 0; left: 0;
width: 100%; height: 100%;
background: rgba(0,0,0,0.5);
z-index: 999;
display: none;
}
.toast {
position: fixed;
bottom: 20px;
right: 20px;
background: var(--success);
color: white;
padding: 12px 24px;
border-radius: 6px;
display: none;
animation: slideIn 0.3s;
z-index: 2000;
}
@keyframes slideIn {
from { opacity: 0; transform: translateY(20px); }
to { opacity: 1; transform: translateY(0); }
}
@media (max-width: 768px) {
.cuerpo-cornell { flex-direction: column; }
.col-izq, .col-der { width: 100%; border-right: none; border-bottom: 2px solid #333; }
.col-izq { min-height: 150px; }
.nav-controls button { padding: 6px 10px; font-size: 0.9rem; }
.editor-tools { overflow-x: auto; }
}
#file-input { display: none; }
</style>
</head>
<body>
<!-- === TU HTML ORIGINAL COMPLETO (SIN CAMBIOS) === -->
<nav>
<div class="nav-brand" onclick="irAInicio()">
📚 Cornell Cloud
<span class="nav-version">V3-FB</span>
</div>
<div class="nav-controls" id="nav-buttons"></div>
</nav>
<div id="vista-temas" class="view active">
<div class="temas-header">
<h2>📁 Mis Materias / Temas</h2>
<button class="accent" onclick="abrirModalTema()">+ Nuevo Tema</button>
</div>
<div id="grid-temas" class="grid-temas"></div>
<div id="mensaje-no-temas" style="text-align: center; color: #999; margin-top: 50px; display: none;">
<h3>No hay temas creados aún</h3>
<p>¡Crea tu primer tema para empezar a estudiar!</p>
</div>
</div>

<div class="breadcrumb">
<span onclick="irAInicio()">🏠 Inicio</span> / <span id="breadcrumb-tema">Tema</span>
</div>
<div class="toolbar">
<input type="text" id="buscador" class="search-box" placeholder="🔍 Buscar en este cuaderno..." oninput="renderizarIndice()">
<select id="ordenador" onchange="renderizarIndice()" style="padding: 10px; border: 1px solid var(--border); border-radius: 4px;">

<input type="text" id="input-titulo" placeholder="📝 Título de la nota" oninput="guardarNotaActual()">
<button class="danger" onclick="borrarNotaActual()" style="padding: 5px 10px;">🗑️</button>
</div>
<div class="editor-tools">
<button class="tool-btn" onclick="activarDibujo()" id="btn-dibujo">✏️ Dibujar</button>
<button class="tool-btn" onclick="document.getElementById('file-input').click()">🖼️ Imagen</button>
<button class="tool-btn" onclick="abrirModalLink()">🔗 Link Web</button>
<button class="tool-btn" onclick="abrirModalEnlaces()">📎 Enlazar Nota</button>
<div class="tool-separator"></div>
<input type="color" class="color-picker" id="color-picker" value="#000000" onchange="actualizarColorDibujo()">
<input type="range" class="brush-size" id="brush-size" min="1" max="20" value="3" onchange="actualizarTamanioDibujo()">
<span style="font-size: 0.8rem; color: #666; align-self: center;">Tamaño: <span id="brush-size-value">3</span>px</span>
</div>
<div class="cuerpo-cornell">
<div class="col-izq">
<div style="font-weight: bold; margin-bottom: 10px; color: #666;">💡 Palabras Clave</div>
<textarea id="input-claves" placeholder="Preguntas / Conceptos clave..." oninput="guardarNotaActual()"></textarea>

<canvas id="canvas-izq"></canvas>
<div class="canvas-toolbar">

</div>
</div>

<div style="font-weight: bold; margin-bottom: 10px; color: #666;">📖 Notas Principales</div>
<textarea id="input-notas" placeholder="Toma tus notas aquí..." oninput="guardarNotaActual()"></textarea>
<div id="media-container-der"></div>
<div id="canvas-container-der" class="canvas-container" style="display: none; flex: 1; min-height: 300px;">
<canvas id="canvas-der"></canvas>
<div class="canvas-toolbar">
<button onclick="limpiarCanvas('der')">🗑️</button>
<button onclick="toggleCanvas('der')">❌</button>
</div>
</div>
</div>
</div>
<div class="resumen-cornell">
<div style="font-weight: bold; margin-bottom: 10px; color: #666;">📋 Resumen</div>

</div>
</div>
</div>
<input type="file" id="file-input" accept="image/*" onchange="procesarImagen(event)">

<div class="modal-actions">
<button class="btn-cancel" onclick="cerrarModales()">Cancelar</button>
<button class="btn-confirm" onclick="guardarNuevoTema()">Crear</button>
</div>
</div>
<div id="modal-link" class="modal">
<h3>🔗 Insertar Link de Internet</h3>
<input type="url" id="input-url" placeholder="https://ejemplo.com">
<input type="text" id="input-url-titulo" placeholder="Título del enlace (opcional)">
<div class="modal-actions">
<button class="btn-cancel" onclick="cerrarModales()">Cancelar</button>
<button class="btn-confirm" onclick="insertarLinkWeb()">Insertar</button>
</div>
</div>
<div id="modal-enlaces" class="modal">
<h3>📎 Enlazar con otra nota</h3>
<select id="select-notas-destino"></select>
<div class="modal-actions">
<button class="btn-cancel" onclick="cerrarModales()">Cancelar</button>
<button class="btn-confirm" onclick="insertarEnlaceNota()">Insertar</button>
</div>
</div>
<div id="toast" class="toast">✓ Guardado</div>

<!-- ============================================ -->
<!-- 🔥 FIREBASE: SOLO ESTO SE AGREGA -->
<!-- ============================================ -->
<script type="module">
// 🔥 Importar Firebase (NO CAMBIAR)
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getFirestore, doc, setDoc, collection, getDocs } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

// 🔥 TUS CREDENCIALES (YA INTEGRADAS)
const firebaseConfig = {
  apiKey: "AIzaSyBmUSEwkAruVTXBCPmvHTr8h8ir_KQRGNo",
  authDomain: "study-notes-pro.firebaseapp.com",
  projectId: "study-notes-pro",
  storageBucket: "study-notes-pro.firebasestorage.app",
  messagingSenderId: "284146708981",
  appId: "1:284146708981:web:82c77d6ccde11a8b4af0bc"
};

// 🔥 Inicializar
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const USER_ID = 'user-unico'; // ID fijo para uso personal

// ============================================
// TU CÓDIGO JS ORIGINAL - SOLO 2 FUNCIONES MODIFICADAS
// ============================================

// Variables globales (TU CÓDIGO)
let temas = [];
let notas = [];
let temaActualId = null;
let notaActualId = null;
let modoDibujo = false;
let canvasActivo = null;
let ctx = null;
let dibujando = false;
let ultimoX = 0;
let ultimoY = 0;

// 🔥 FUNCIÓN cargarDatos MODIFICADA (Firestore en vez de localStorage)
async function cargarDatos() {
  try {
    // Cargar temas desde Firestore
    const temasSnap = await getDocs(collection(db, 'users', USER_ID, 'temas'));
    temas = [];
    temasSnap.forEach(d => temas.push({ id: d.id, ...d.data() }));
    
    // Cargar notas desde Firestore
    const notasSnap = await getDocs(collection(db, 'users', USER_ID, 'notas'));
    notas = [];
    notasSnap.forEach(d => notas.push({ id: d.id, ...d.data() }));
    
    mostrarToast();
  } catch (e) {
    console.error('Firebase error:', e);
    // Fallback a localStorage si Firebase falla
    const t = localStorage.getItem('cornell_v3_temas');
    const n = localStorage.getItem('cornell_v3_notas');
    if (t) temas = JSON.parse(t);
    if (n) notas = JSON.parse(n);
  }
}

// 🔥 FUNCIÓN guardarDatos MODIFICADA (Firestore + localStorage como backup)
async function guardarDatos() {
  try {
    // Guardar en Firestore
    for (const t of temas) {
      await setDoc(doc(db, 'users', USER_ID, 'temas', t.id), t);
    }
    for (const n of notas) {
      await setDoc(doc(db, 'users', USER_ID, 'notas', n.id), n);
    }
  } catch (e) {
    console.error('Firebase save error:', e);
  }
  // Siempre guardar en localStorage como respaldo local
  try {
    localStorage.setItem('cornell_v3_temas', JSON.stringify(temas));
    localStorage.setItem('cornell_v3_notas', JSON.stringify(notas));
    mostrarToast();
  } catch (e) {
    alert('⚠️ Memoria llena');
  }
}

// TU FUNCIÓN mostrarToast (SIN CAMBIOS)
function mostrarToast() {
  const toast = document.getElementById('toast');
  toast.style.display = 'block';
  setTimeout(() => { toast.style.display = 'none'; }, 2000);
}

// ============================================
// TODAS TUS FUNCIONES ORIGINALES (SIN CAMBIOS)
// ============================================
function mostrarVista(idVista) {
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.getElementById(idVista).classList.add('active');
  const nav = document.getElementById('nav-buttons');
  nav.innerHTML = '';
  if (idVista === 'vista-temas') {
    nav.innerHTML = `<button class="accent" onclick="abrirModalTema()">+ Tema</button>`;
    renderizarTemas();
  } else if (idVista === 'vista-indice') {
    nav.innerHTML = `<button class="success" onclick="crearNuevaNota()">+ Nueva Nota</button>`;
    document.getElementById('breadcrumb-tema').innerText = temas.find(t => t.id === temaActualId)?.nombre || 'Tema';
    renderizarIndice();
  } else if (idVista === 'vista-editor') {
    nav.innerHTML = `<span style="color: #666; font-size: 0.9rem;">✏️ Editando</span>`;
  }
}
function irAInicio() { temaActualId = null; notaActualId = null; mostrarVista('vista-temas'); }
function entrarEnTema(id) { temaActualId = id; mostrarVista('vista-indice'); }
function volverAlIndice() { notaActualId = null; mostrarVista('vista-indice'); }
function abrirModalTema() {
  document.getElementById('input-nuevo-tema').value = '';
  document.getElementById('overlay').style.display = 'block';
  document.getElementById('modal-tema').style.display = 'block';
  document.getElementById('input-nuevo-tema').focus();
}
function guardarNuevoTema() {
  const nombre = document.getElementById('input-nuevo-tema').value.trim();
  if (nombre) {
    temas.push({ id: Date.now(), nombre: nombre });
    guardarDatos();
    cerrarModales();
    renderizarTemas();
  }
}
function borrarTema(id, event) {
  event.stopPropagation();
  if(confirm("¿Borrar este tema y TODAS sus notas? Esta acción no se puede deshacer.")) {
    temas = temas.filter(t => t.id !== id);
    notas = notas.filter(n => n.temaId !== id);
    guardarDatos();
    renderizarTemas();
  }
}
function renderizarTemas() {
  const grid = document.getElementById('grid-temas');
  grid.innerHTML = '';
  if (temas.length === 0) {
    document.getElementById('mensaje-no-temas').style.display = 'block';
    return;
  } else {
    document.getElementById('mensaje-no-temas').style.display = 'none';
  }
  temas.forEach(tema => {
    const count = notas.filter(n => n.temaId === tema.id).length;
    const card = document.createElement('div');
    card.className = 'tema-card';
    card.onclick = () => entrarEnTema(tema.id);
    card.innerHTML = `<button class="btn-delete-tema" onclick="borrarTema(${tema.id}, event)">×</button><h2>${tema.nombre}</h2><span class="count">${count} cuaderno${count !== 1 ? 's' : ''}</span>`;
    grid.appendChild(card);
  });
}
function crearNuevaNota() {
  const nuevaNota = { id: Date.now(), temaId: temaActualId, titulo: '', claves: '', notas: '', resumen: '', dibujos: { izq: null, der: null }, media: [], enlacesInternos: [], enlacesExternos: [], fecha: new Date().toISOString() };
  notas.push(nuevaNota);
  guardarDatos();
  abrirEditor(nuevaNota.id);
}
function abrirEditor(id) {
  notaActualId = id;
  const nota = notas.find(n => n.id === id);
  document.getElementById('input-titulo').value = nota.titulo;
  document.getElementById('input-claves').value = procesarTextoConEnlaces(nota.claves);
  document.getElementById('input-notas').value = procesarTextoConEnlaces(nota.notas);
  document.getElementById('input-resumen').value = procesarTextoConEnlaces(nota.resumen);
  if (nota.dibujos?.izq) { document.getElementById('canvas-container-izq').style.display = 'block'; cargarCanvas('izq', nota.dibujos.izq); }
  if (nota.dibujos?.der) { document.getElementById('canvas-container-der').style.display = 'block'; cargarCanvas('der', nota.dibujos.der); }
  renderizarMedia(nota.media);
  mostrarVista('vista-editor');
}
function guardarNotaActual() {
  if (!notaActualId) return;
  const nota = notas.find(n => n.id === notaActualId);
  nota.titulo = document.getElementById('input-titulo').value;
  nota.claves = obtenerTextoPlano('input-claves');
  nota.notas = obtenerTextoPlano('input-notas');
  nota.resumen = obtenerTextoPlano('input-resumen');
  nota.fecha = new Date().toISOString();
  guardarDatos();
}
function borrarNotaActual() {
  if(confirm("¿Borrar esta nota permanentemente?")) {
    notas = notas.filter(n => n.id !== notaActualId);
    guardarDatos();
    volverAlIndice();
  }
}
function renderizarIndice() {
  const grid = document.getElementById('grid-notas');
  const busqueda = document.getElementById('buscador').value.toLowerCase();
  const orden = document.getElementById('ordenador').value;
  grid.innerHTML = '';
  let filtradas = notas.filter(n => n.temaId === temaActualId && (n.titulo.toLowerCase().includes(busqueda) || n.notas.toLowerCase().includes(busqueda) || n.claves.toLowerCase().includes(busqueda)));
  filtradas.sort((a, b) => { if (orden === 'fecha-desc') return new Date(b.fecha) - new Date(a.fecha); if (orden === 'fecha-asc') return new Date(a.fecha) - new Date(b.fecha); if (orden === 'titulo-asc') return a.titulo.localeCompare(b.titulo); });
  if (filtradas.length === 0) { grid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: #999; padding: 40px;">No hay notas en este tema. ¡Crea la primera! 📝</p>'; return; }
  filtradas.forEach(nota => {
    const card = document.createElement('div');
    card.className = 'nota-card';
    card.onclick = () => abrirEditor(nota.id);
    const preview = nota.notas.replace(/\[\[(\d+)\|([^\]]+)\]\]/g, '[Nota]').replace(/\[\[URL:([^\]]+)\]\]/g, '[Link]').substring(0, 100) + '...';
    const fechaFmt = new Date(nota.fecha).toLocaleDateString();
    let mediaIcons = '';
    if (nota.dibujos?.izq || nota.dibujos?.der) mediaIcons += '<span class="media-icon" title="Dibujos">✏️</span>';
    if (nota.media?.some(m => m.tipo === 'imagen')) mediaIcons += '<span class="media-icon" title="Imágenes">🖼️</span>';
    if (nota.media?.some(m => m.tipo === 'link')) mediaIcons += '<span class="media-icon" title="Links">🔗</span>';
    card.innerHTML = `<div><h3>${nota.titulo || 'Sin Título'}</h3><p>${preview || 'Sin contenido...'}</p>${mediaIcons ? `<div class="nota-preview-media">${mediaIcons}</div>` : ''}</div><div class="nota-meta"><span>📅 ${fechaFmt}</span><span>📎 ${contarEnlaces(nota)}</span></div>`;
    grid.appendChild(card);
  });
}
function setupCanvas() {
  ['izq', 'der'].forEach(lado => {
    const canvas = document.getElementById(`canvas-${lado}`);
    const container = document.getElementById(`canvas-container-${lado}`);
    function resizeCanvas() { canvas.width = container.clientWidth; canvas.height = container.clientHeight; const nota = notas.find(n => n.id === notaActualId); if (nota?.dibujos?.[lado]) { cargarCanvas(lado, nota.dibujos[lado]); } }
    canvas.addEventListener('mousedown', iniciarDibujo);
    canvas.addEventListener('mousemove', dibujar);
    canvas.addEventListener('mouseup', finalizarDibujo);
    canvas.addEventListener('mouseout', finalizarDibujo);
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); const touch = e.touches[0]; const mouseEvent = new MouseEvent('mousedown', { clientX: touch.clientX, clientY: touch.clientY }); canvas.dispatchEvent(mouseEvent); });
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); const touch = e.touches[0]; const mouseEvent = new MouseEvent('mousemove', { clientX: touch.clientX, clientY: touch.clientY }); canvas.dispatchEvent(mouseEvent); });
    canvas.addEventListener('touchend', () => { const mouseEvent = new MouseEvent('mouseup', {}); canvas.dispatchEvent(mouseEvent); });
    window.addEventListener('resize', resizeCanvas);
  });
}
function activarDibujo() { modoDibujo = !modoDibujo; document.getElementById('btn-dibujo').classList.toggle('active', modoDibujo); if (modoDibujo) { document.getElementById('canvas-container-der').style.display = 'block'; inicializarCanvas('der'); } }
function toggleCanvas(lado) { const container = document.getElementById(`canvas-container-${lado}`); container.style.display = container.style.display === 'none' ? 'block' : 'none'; if (container.style.display === 'block') { inicializarCanvas(lado); } }
function inicializarCanvas(lado) { const canvas = document.getElementById(`canvas-${lado}`); const container = document.getElementById(`canvas-container-${lado}`); canvas.width = container.clientWidth; canvas.height = container.clientHeight; ctx = canvas.getContext('2d'); ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.strokeStyle = document.getElementById('color-picker').value; ctx.lineWidth = document.getElementById('brush-size').value; canvasActivo = lado; }
function cargarCanvas(lado, datos) { const canvas = document.getElementById(`canvas-${lado}`); const container = document.getElementById(`canvas-container-${lado}`); canvas.width = container.clientWidth; canvas.height = container.clientHeight; ctx = canvas.getContext('2d'); const img = new Image(); img.onload = () => { ctx.drawImage(img, 0, 0); }; img.src = datos; canvasActivo = lado; }
function iniciarDibujo(e) { if (!modoDibujo && canvasActivo === null) return; dibujando = true; const rect = e.target.getBoundingClientRect(); ultimoX = e.clientX - rect.left; ultimoY = e.clientY - rect.top; }
function dibujar(e) { if (!dibujando || !ctx) return; const rect = e.target.getBoundingClientRect(); const x = e.clientX - rect.left; const y = e.clientY - rect.top; ctx.beginPath(); ctx.moveTo(ultimoX, ultimoY); ctx.lineTo(x, y); ctx.stroke(); ultimoX = x; ultimoY = y; }
function finalizarDibujo() { if (!dibujando) return; dibujando = false; guardarDibujo(); }
function guardarDibujo() { if (!notaActualId || !canvasActivo) return; const nota = notas.find(n => n.id === notaActualId); const canvas = document.getElementById(`canvas-${canvasActivo}`); nota.dibujos = nota.dibujos || {}; nota.dibujos[canvasActivo] = canvas.toDataURL('image/png'); guardarDatos(); }
function limpiarCanvas(lado) { if(confirm("¿Borrar este dibujo?")) { const canvas = document.getElementById(`canvas-${lado}`); const ctx = canvas.getContext('2d'); ctx.clearRect(0, 0, canvas.width, canvas.height); const nota = notas.find(n => n.id === notaActualId); if (nota?.dibujos) { nota.dibujos[lado] = null; guardarDatos(); } } }
function actualizarColorDibujo() { if (ctx) { ctx.strokeStyle = document.getElementById('color-picker').value; } }
function actualizarTamanioDibujo() { const size = document.getElementById('brush-size').value; document.getElementById('brush-size-value').innerText = size; if (ctx) { ctx.lineWidth = size; } }
function procesarImagen(event) {
  const file = event.target.files[0];
  if (!file) return;
  if (file.size > 2 * 1024 * 1024) { alert('⚠️ La imagen es muy grande. Máximo 2MB.'); return; }
  const reader = new FileReader();
  reader.onload = function(e) {
    const nota = notas.find(n => n.id === notaActualId);
    nota.media = nota.media || [];
    nota.media.push({ id: Date.now(), tipo: 'imagen', datos: e.target.result, caption: file.name });
    guardarDatos();
    renderizarMedia(nota.media);
  };
  reader.readAsDataURL(file);
  event.target.value = '';
}
function abrirModalLink() { document.getElementById('input-url').value = ''; document.getElementById('input-url-titulo').value = ''; document.getElementById('overlay').style.display = 'block'; document.getElementById('modal-link').style.display = 'block'; document.getElementById('input-url').focus(); }
function insertarLinkWeb() { const url = document.getElementById('input-url').value.trim(); const titulo = document.getElementById('input-url-titulo').value.trim() || url; if (url) { const nota = notas.find(n => n.id === notaActualId); nota.media = nota.media || []; nota.media.push({ id: Date.now(), tipo: 'link', url: url, titulo: titulo }); guardarDatos(); renderizarMedia(nota.media); cerrarModales(); } }
function renderizarMedia(media) {
  const container = document.getElementById('media-container-der');
  container.innerHTML = '';
  if (!media || media.length === 0) return;
  media.forEach(item => {
    const div = document.createElement('div');
    div.className = 'media-item';
    if (item.tipo === 'imagen') { div.innerHTML = `<button class="media-delete" onclick="borrarMedia(${item.id})">×</button><img src="${item.datos}" alt="${item.caption}"><div class="media-caption">${item.caption}</div>`; }
    else if (item.tipo === 'link') { div.innerHTML = `<button class="media-delete" onclick="borrarMedia(${item.id})">×</button><a href="${item.url}" target="_blank" class="media-link">🔗 ${item.titulo}</a>`; }
    container.appendChild(div);
  });
}
function borrarMedia(id) { if(confirm("¿Borrar este elemento?")) { const nota = notas.find(n => n.id === notaActualId); nota.media = nota.media.filter(m => m.id !== id); guardarDatos(); renderizarMedia(nota.media); } }
function abrirModalEnlaces() {
  const select = document.getElementById('select-notas-destino');
  select.innerHTML = '';
  const notasDisponibles = notas.filter(n => n.id !== notaActualId && n.temaId === temaActualId);
  if (notasDisponibles.length === 0) { alert("No hay otras notas en este tema para enlazar."); return; }
  notasDisponibles.forEach(n => { const opt = document.createElement('option'); opt.value = n.id; opt.text = n.titulo || 'Sin Título'; select.appendChild(opt); });
  document.getElementById('overlay').style.display = 'block';
  document.getElementById('modal-enlaces').style.display = 'block';
}
function insertarEnlaceNota() {
  const select = document.getElementById('select-notas-destino');
  const idDestino = select.value;
  const tituloDestino = select.options[select.selectedIndex].text;
  const textarea = document.getElementById('input-notas');
  textarea.value += ` [[${idDestino}|${tituloDestino}]] `;
  guardarNotaActual();
  cerrarModales();
  abrirEditor(notaActualId);
}
function procesarTextoConEnlaces(texto) {
  if (!texto) return '';
  texto = texto.replace(/\[\[(\d+)\|([^\]]+)\]\]/g, (match, id, titulo) => { return `<span class="hyperlink-tag" onclick="abrirEditor(${id})">📎 ${titulo}</span>`; });
  texto = texto.replace(/\[\[URL:([^\]]+)\|([^\]]+)\]\]/g, (match, url, titulo) => { return `<span class="external-link-tag" onclick="window.open('${url}', '_blank')">🔗 ${titulo}</span>`; });
  return texto;
}
function contarEnlaces(nota) { let count = 0; if (nota.dibujos?.izq || nota.dibujos?.der) count++; if (nota.media?.length) count += nota.media.length; return count; }
function obtenerTextoPlano(idElemento) { return document.getElementById(idElemento).value; }
function cerrarModales() { document.getElementById('overlay').style.display = 'none'; document.getElementById('modal-tema').style.display = 'none'; document.getElementById('modal-link').style.display = 'none'; document.getElementById('modal-enlaces').style.display = 'none'; }
function exportarAJSON() {
  const data = { version: '3.0-FB', exportDate: new Date().toISOString(), temas: temas, notas: notas };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `cornell_backup_${new Date().toISOString().split('T')[0]}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

// 🔥 CRÍTICO: Exponer funciones para onclick con type="module"
window.irAInicio = irAInicio;
window.entrarEnTema = entrarEnTema;
window.volverAlIndice = volverAlIndice;
window.abrirModalTema = abrirModalTema;
window.guardarNuevoTema = guardarNuevoTema;
window.borrarTema = borrarTema;
window.renderizarTemas = renderizarTemas;
window.crearNuevaNota = crearNuevaNota;
window.abrirEditor = abrirEditor;
window.guardarNotaActual = guardarNotaActual;
window.borrarNotaActual = borrarNotaActual;
window.renderizarIndice = renderizarIndice;
window.activarDibujo = activarDibujo;
window.toggleCanvas = toggleCanvas;
window.limpiarCanvas = limpiarCanvas;
window.actualizarColorDibujo = actualizarColorDibujo;
window.actualizarTamanioDibujo = actualizarTamanioDibujo;
window.procesarImagen = procesarImagen;
window.abrirModalLink = abrirModalLink;
window.insertarLinkWeb = insertarLinkWeb;
window.borrarMedia = borrarMedia;
window.abrirModalEnlaces = abrirModalEnlaces;
window.insertarEnlaceNota = insertarEnlaceNota;
window.cerrarModales = cerrarModales;
window.exportarAJSON = exportarAJSON;
window.cargarDatos = cargarDatos;
window.guardarDatos = guardarDatos;
window.mostrarToast = mostrarToast;
window.setupCanvas = setupCanvas;
window.inicializarCanvas = inicializarCanvas;
window.cargarCanvas = cargarCanvas;
window.iniciarDibujo = iniciarDibujo;
window.dibujar = dibujar;
window.finalizarDibujo = finalizarDibujo;
window.guardarDibujo = guardarDibujo;
window.obtenerTextoPlano = obtenerTextoPlano;
window.contarEnlaces = contarEnlaces;
window.procesarTextoConEnlaces = procesarTextoConEnlaces;
window.renderizarMedia = renderizarMedia;

// ============================================
// INICIALIZACIÓN (TU CÓDIGO + Firebase)
// ============================================
window.onload = async function() {
  await cargarDatos(); // 🔥 Firebase version
  irAInicio();
  setupCanvas();
};

// Event listeners (TU CÓDIGO)
window.addEventListener('beforeunload', guardarDatos);
document.addEventListener('keydown', function(e) {
  if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); guardarDatos(); }
  if ((e.ctrlKey || e.metaKey) && e.key === 'e') { e.preventDefault(); exportarAJSON(); }
});
</script>
